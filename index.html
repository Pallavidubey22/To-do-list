<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <h2>To Do List<img src="images/icon.png" alt="To Do Icon"></h2>
            <div class="row">
                <input type="text" id="input-box" placeholder="Add a new task...">
                <button>Add</button>
            </div>
            <ul id="list-container">
              <li><span class="task-text">Sample Task 1</span> <button type="button" class="delete-btn">×</button></li>
              <li><span class="task-text">Sample Task 2</span> <button type="button" class="delete-btn">×</button></li>
              <li><span class="task-text">Sample Task 3</span> <button type="button" class="delete-btn">×</button></li>
                       
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
